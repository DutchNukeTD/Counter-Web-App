<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Counter PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <header>
        <div class="header-top">
            <h1>Event Counter</h1>
            <div class="view-toggles">
                <div class="dropdown-container">
                    <button id="timeframeBtn" class="icon-btn">[V]</button>
                    <div id="timeframeMenu" class="dropdown-menu hidden">
                        <div class="dropdown-item" data-val="U">Uur [U]</div>
                        <div class="dropdown-item" data-val="V">Vandaag [V]</div>
                        <div class="dropdown-item" data-val="W">Week [W]</div>
                        <div class="dropdown-item" data-val="M">Maand [M]</div>
                        <div class="dropdown-item" data-val="J">Jaar [J]</div>
                    </div>
                </div>
                <button id="compactBtn" class="icon-btn" title="Compact View">C</button>
            </div>
        </div>
        <div class="controls">
            <select id="sortSelect">
                <option value="manual">Manual Order</option>
                <option value="alphabetical">Alphabetical</option>
                <option value="highest">Highest</option>
            </select>
            <button id="exportBtn" class="secondary-btn">⬇ CSV</button>
            <button id="openModalBtn" class="primary-btn">+ New Card</button>
        </div>

        <div class="tabs-container">
            <button id="archiveTab" class="tab-btn">Archief</button>
            <button id="favoritesTab" class="tab-btn active">Favorieten</button>
            <button id="dashboardTab" class="tab-btn">Dashboard</button>
        </div>
    </header>

    <main id="mainContent">
        <div id="cardContainer"></div>
        <div id="dashboardContainer" class="hidden-tab">
            <div class="dashboard-header">
                <div class="time-presets">
                    <select id="dashboardPreset" onchange="handlePresetChange(this.value)">
                        <option value="today">Vandaag</option>
                        <option value="14d" selected>Afgelopen 14 dagen</option>
                        <option value="month">Huidige maand</option>
                        <option value="3m">Afgelopen 3 maanden</option>
                        <option value="6m">Afgelopen half jaar</option>
                        <option value="1y">Afgelopen jaar</option>
                        <option value="custom">Aangepaste periode...</option>
                    </select>
                </div>
                <div id="customDateRange" class="hidden">
                    <input type="date" id="dashStart" onchange="renderDashboard()">
                    <input type="date" id="dashEnd" onchange="renderDashboard()">
                </div>
            </div>
            <div class="dashboard-filters" id="dashboardFilters"></div>
            <div class="chart-wrapper">
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </main>

    <div id="newCardModal" class="modal hidden">
        <div class="modal-content">
            <h2>Nieuwe Kaart</h2>
            <input type="text" id="cardTitleInput" placeholder="Titel van de kaart" autocomplete="off">
            <div class="modal-row">
                <div class="modal-col">
                    <label>Startwaarde</label>
                    <input type="number" id="cardStartInput" value="0">
                </div>
                <div class="modal-col">
                    <label>Stapgrootte</label>
                    <input type="number" id="cardStepInput" value="1">
                </div>
            </div>
            <p class="color-label">Kies een kleur:</p>
            <div id="colorPicker" class="color-grid"></div>
            <div class="modal-actions">
                <button id="cancelModalBtn" class="secondary-btn">Annuleren</button>
                <button id="saveCardBtn" class="primary-btn">Opslaan</button>
            </div>
            <div id="editActionsArea" class="modal-actions-edit hidden">
                <button id="deleteCardBtn" class="danger-btn-outline">Verwijderen</button>
                <button id="archiveCardBtn" class="secondary-btn">Archiveer</button>
            </div>
            </div>
    </div>

    <div id="mealModal" class="modal hidden">
        <div class="modal-content">
            <h2>Wat heb je gegeten?</h2>
            <select id="mealSelect" style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc;">
                <option value="">-- Kies uit lijst --</option>
            </select>
            <input type="text" id="customMealInput" placeholder="Of typ zelf iets nieuws..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 20px;">
            <div class="modal-actions">
                <button id="cancelMealBtn" class="secondary-btn">Annuleren</button>
                <button id="confirmMealBtn" class="primary-btn">Log Eten</button>
            </div>
        </div>
    </div>

    <!-- POEP MODAL (Bristol Stoelgangschaal) -->
    <div id="poepModal" class="modal hidden" style="z-index: 1050;">
        <div class="modal-content">
            <h2>🚽 Poep Loggen</h2>
            <p class="color-label">Type (Bristol schaal):</p>
            <div class="bristol-grid" id="bristolGrid"></div>
            <div class="poep-extras">
                <label class="poep-checkbox-label">
                    <input type="checkbox" id="poepRemsporen"> Remsporen
                </label>
                <label class="poep-checkbox-label">
                    <input type="checkbox" id="poepDrijven"> Drijven
                </label>
                <label class="poep-checkbox-label">
                    <input type="checkbox" id="poepStinkt"> Stinkt extra
                </label>
            </div>
            <div class="modal-actions" style="margin-top:1.2rem;">
                <button id="cancelPoepBtn" class="secondary-btn">Annuleren</button>
                <button id="confirmPoepBtn" class="primary-btn">Log Poep 💩</button>
            </div>
        </div>
    </div>

    <div id="confirmDeleteModal" class="modal hidden" style="z-index: 1100;">
        <div class="modal-content danger-zone">
            <h3>Kaart Verwijderen?</h3>
            <p>De kaart wordt volledig verborgen. De historie blijft in de CSV.</p>
            <div class="modal-actions">
                <button id="cancelDeleteBtn" class="secondary-btn">Terug</button>
                <button id="confirmDeleteBtn" class="danger-btn">Verwijder</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
